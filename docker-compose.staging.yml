services:
  risk-hub-staging-db:
    image: postgres:16-alpine
    container_name: risk_hub_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: risk_hub_staging
      POSTGRES_USER: risk_hub
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD}
    volumes:
      - risk_hub_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_hub -d risk_hub_staging"]
      interval: 5s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - risk_hub_staging_network

  risk-hub-staging-redis:
    image: redis:7-alpine
    container_name: risk_hub_staging_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "48mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 24M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - risk_hub_staging_network

  risk-hub-staging-web:
    image: ghcr.io/achimdehnert/risk-hub/risk-hub-web:${IMAGE_TAG:-latest}
    container_name: risk_hub_staging_web
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_ENV: staging
      DEBUG: "false"
      DATABASE_URL: postgres://risk_hub:${STAGING_DB_PASSWORD}@risk-hub-staging-db:5432/risk_hub_staging
      REDIS_URL: redis://risk-hub-staging-redis:6379/0
      SECRET_KEY: ${STAGING_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: staging.schutztat.de,.staging.schutztat.de,localhost
      TENANT_BASE_DOMAIN: staging.schutztat.de
      TENANT_BASE_DOMAINS: staging.schutztat.de
      TENANT_ALLOW_LOCALHOST: "0"
      TENANT_RESERVED_SUBDOMAINS: www
      CSRF_TRUSTED_ORIGINS: https://staging.schutztat.de,https://*.staging.schutztat.de
      GHCR_OWNER: achimdehnert
      GHCR_REPO: risk-hub
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    entrypoint: ["/entrypoint.sh"]
    command: ["web"]
    depends_on:
      risk-hub-staging-db:
        condition: service_healthy
      risk-hub-staging-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8099:8000"
    volumes:
      - risk_hub_staging_media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/livez/')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - risk_hub_staging_network

  risk-hub-staging-worker:
    image: ghcr.io/achimdehnert/risk-hub/risk-hub-web:${IMAGE_TAG:-latest}
    container_name: risk_hub_staging_worker
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://risk_hub:${STAGING_DB_PASSWORD}@risk-hub-staging-db:5432/risk_hub_staging
      REDIS_URL: redis://risk-hub-staging-redis:6379/0
      SECRET_KEY: ${STAGING_SECRET_KEY}
    entrypoint: ["/entrypoint.sh"]
    command: ["worker"]
    depends_on:
      risk-hub-staging-db:
        condition: service_healthy
      risk-hub-staging-redis:
        condition: service_healthy
    volumes:
      - risk_hub_staging_media:/app/media
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - risk_hub_staging_network

volumes:
  risk_hub_staging_pgdata:
  risk_hub_staging_media:

networks:
  risk_hub_staging_network:
    driver: bridge
