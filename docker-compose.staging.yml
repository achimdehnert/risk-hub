# risk-hub — Staging Docker Compose
# Domain: staging.kiohnerisiko.de | Port: 8190

services:
  risk-hub-staging-db:
    image: postgres:16-alpine
    container_name: risk_hub_staging_db
    restart: unless-stopped
    env_file: .env.staging
    volumes:
      - risk_hub_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_hub_staging -d risk_hub_staging"]
      interval: 5s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 256M
    shm_size: 64m
    networks:
      - risk_hub_staging_network

  risk-hub-staging-redis:
    image: redis:7-alpine
    container_name: risk_hub_staging_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - risk_hub_staging_network

  risk-hub-staging-web:
    image: ghcr.io/achimdehnert/risk-hub:${IMAGE_TAG:-latest}
    container_name: risk_hub_staging_web
    restart: unless-stopped
    env_file: .env.staging
    ports:
      - "127.0.0.1:8190:8000"
    depends_on:
      risk-hub-staging-db:
        condition: service_healthy
      risk-hub-staging-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/livez/')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - risk_hub_staging_network

volumes:
  risk_hub_staging_pgdata:

networks:
  risk_hub_staging_network:
    driver: bridge
