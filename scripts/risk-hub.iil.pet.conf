server {
    listen 80;
    listen [::]:80;
    server_name risk-hub.iil.pet; # noqa: hardcode
    return 301 https://risk-hub.iil.pet$request_uri; # noqa: hardcode
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name risk-hub.iil.pet; # noqa: hardcode

    ssl_certificate /etc/letsencrypt/live/risk-hub.iil.pet/fullchain.pem; # noqa: hardcode
    ssl_certificate_key /etc/letsencrypt/live/risk-hub.iil.pet/privkey.pem; # noqa: hardcode

    client_max_body_size 100M;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    location /accounts/login/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8090; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8090; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}
