# Nginx config: staging.risk-hub.iil.pet → risk-hub staging (port 8101)

server {
    listen 80;
    listen [::]:80;
    server_name staging.risk-hub.iil.pet;
    return 301 https://staging.risk-hub.iil.pet$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.risk-hub.iil.pet;

    ssl_certificate /etc/letsencrypt/live/staging.risk-hub.iil.pet/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.risk-hub.iil.pet/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}
