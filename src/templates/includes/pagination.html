{% if page_obj.has_other_pages %}
<nav class="flex justify-center gap-2 mt-4">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}"
       class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-50">← Zurück</a>
    {% endif %}
    <span class="px-3 py-1.5 text-sm text-gray-500">Seite {{ page_obj.number }} von {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}"
       class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-50">Weiter →</a>
    {% endif %}
</nav>
{% endif %}
