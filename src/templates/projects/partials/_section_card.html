<div class="p-5">
    <div class="flex justify-between items-center mb-3">
        <h3 class="text-sm font-semibold text-gray-900">{{ section.title }}</h3>
        <div class="flex items-center gap-2">
            {% if section.is_ai_generated %}
            <span class="px-1.5 py-0.5 text-xs rounded bg-purple-100 text-purple-700">KI-generiert</span>
            {% endif %}
            {% if section.content %}
            <span class="px-1.5 py-0.5 text-xs rounded bg-green-100 text-green-700">Ausgefüllt</span>
            {% else %}
            <span class="px-1.5 py-0.5 text-xs rounded bg-gray-100 text-gray-500">Leer</span>
            {% endif %}
        </div>
    </div>

    <form hx-post="{% url 'projects:section-save' pk=project.pk doc_pk=doc.pk sec_pk=section.pk %}"
          hx-target="#section-{{ section.pk }}"
          hx-swap="innerHTML"
          class="space-y-3">
        {% csrf_token %}
        <textarea name="content" rows="6"
                  placeholder="Inhalt für diesen Abschnitt eingeben oder per KI generieren lassen..."
                  class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-orange-500 focus:border-orange-500 resize-y">{{ section.content }}</textarea>
        <div class="flex justify-between items-center">
            <button type="button" disabled
                    class="inline-flex items-center px-3 py-1.5 text-xs bg-purple-50 text-purple-400 rounded-lg cursor-not-allowed"
                    title="KI-Generierung kommt in Phase 5">
                <i data-lucide="sparkles" class="w-3.5 h-3.5 mr-1"></i>
                KI generieren (bald)
            </button>
            <button type="submit"
                    class="inline-flex items-center px-3 py-1.5 text-xs bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition">
                <i data-lucide="save" class="w-3.5 h-3.5 mr-1"></i>
                Speichern
            </button>
        </div>
    </form>

    {% if section.updated_at != section.created_at %}
    <p class="text-xs text-gray-400 mt-2">Zuletzt bearbeitet: {{ section.updated_at|date:"d.m.Y H:i" }}</p>
    {% endif %}
</div>
