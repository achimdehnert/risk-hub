{% extends "base.html" %}
{% load static %}

{% block title %}Dokument hochladen{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8 px-4">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Dokument hochladen</h1>

  <form id="intake-form"
        hx-post="{% url 'intake:upload' %}"
        hx-target="#intake-result"
        hx-swap="innerHTML"
        hx-indicator="#upload-spinner"
        enctype="multipart/form-data"
        class="space-y-6">
    {% csrf_token %}

    <div>
      <label for="facility" class="block text-sm font-medium text-gray-700 mb-1">Betrieb</label>
      <select name="facility" id="facility" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-orange-500 focus:border-orange-500"
              data-testid="intake-facility-select">
        <option value="">— Betrieb auswählen —</option>
        {% for f in facilities %}
          <option value="{{ f.pk }}">{{ f.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Datei</label>
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-orange-400 transition-colors">
        <input type="file" name="file" id="file-input" required
               accept=".pdf,.docx,.xlsx,.csv"
               class="hidden"
               data-testid="intake-file-input">
        <label for="file-input" class="cursor-pointer">
          <i data-lucide="upload-cloud" class="w-10 h-10 mx-auto text-gray-400 mb-3"></i>
          <p class="text-sm text-gray-600">PDF, DOCX, XLSX oder CSV hierher ziehen oder</p>
          <span class="text-orange-600 font-medium text-sm hover:text-orange-800">Datei auswählen</span>
        </label>
        <p id="file-name" class="mt-2 text-xs text-gray-500"></p>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button type="submit"
              class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors"
              data-testid="intake-submit-btn">
        Hochladen &amp; analysieren
      </button>
      <span id="upload-spinner" class="htmx-indicator flex items-center gap-2 text-sm text-gray-500">
        <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
        Wird analysiert…
      </span>
    </div>
  </form>

  <div id="intake-result" class="mt-8"></div>
</div>

<script>
document.getElementById('file-input').addEventListener('change', function() {
  const name = this.files[0]?.name || '';
  document.getElementById('file-name').textContent = name;
});
</script>
{% endblock %}
