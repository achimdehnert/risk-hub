{% extends "base.html" %}
{% block title %}Seite nicht gefunden — Schutztat{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center max-w-md">
        <div class="mx-auto w-20 h-20 rounded-full bg-yellow-100 flex items-center justify-center mb-6">
            <i data-lucide="search-x" class="w-10 h-10 text-yellow-500"></i>
        </div>
        <h1 class="text-4xl font-bold text-gray-900 mb-2">404</h1>
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Seite nicht gefunden</h2>
        <p class="text-gray-500 mb-8">
            Die angeforderte Seite existiert nicht oder wurde verschoben.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="javascript:history.back()"
               class="inline-flex items-center px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm font-medium">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                Zurück
            </a>
            <a href="{% url 'dashboard:home' %}"
               class="inline-flex items-center px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 text-sm font-medium">
                <i data-lucide="home" class="w-4 h-4 mr-2"></i>
                Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}<script>lucide.createIcons();</script>{% endblock %}
