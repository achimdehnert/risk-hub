{% extends "base.html" %}
{% block title %}Leere Vorlage erstellen{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">

  <div class="flex items-center space-x-4 mb-6">
    <a href="{% url 'explosionsschutz:ex-doc-templates' %}" class="text-gray-400 hover:text-gray-600">&larr;</a>
    <h1 class="text-2xl font-bold text-gray-900">Leere Vorlage erstellen</h1>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name der Vorlage *</label>
        <input type="text" name="name" required placeholder="z.B. Ex-Schutz Konzept TRGS 720"
               class="w-full rounded-lg border-gray-300 text-sm focus:border-blue-500 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Beschreibung (optional)</label>
        <textarea name="description" rows="2"
                  class="w-full rounded-lg border-gray-300 text-sm focus:border-blue-500 focus:ring-blue-500"
                  placeholder="Kurze Beschreibung..."></textarea>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <a href="{% url 'explosionsschutz:ex-doc-templates' %}" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Abbrechen</a>
        <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">
          Vorlage erstellen
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
