{% if categories %}
<div class="space-y-2">
  {% for cat in categories %}
  <div class="flex items-center p-3 bg-orange-50 border border-orange-200 rounded-lg">
    <i data-lucide="alert-triangle" class="w-4 h-4 text-orange-500 mr-3 shrink-0"></i>
    <div>
      <span class="text-sm font-medium text-gray-900">{{ cat.name }}</span>
      {% if cat.trgs_reference %}
      <span class="ml-2 text-xs text-gray-500">{{ cat.trgs_reference }}</span>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="p-4 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-500">
  Keine Gefährdungskategorien abgeleitet. Prüfen Sie die H-Code-Mappings.
</div>
{% endif %}
