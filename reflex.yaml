# REFLEX Configuration — risk-hub (Schutztat)
# ADR-162: Reflexive Evidence-based Loop for UI Development
# Updated: 2026-04-17 — Full application coverage

hub_name: risk-hub
vertical: chemical_safety

domain_keywords:
  - Explosionsschutz
  - Gefährdungsbeurteilung
  - GBU
  - ATEX
  - Sicherheitsdatenblatt
  - SDS
  - Gefahrstoff
  - Zoneneinteilung
  - Ex-Schutz-Dokument
  - Betriebsmittel
  - Zündquellenanalyse
  - Schutzmaßnahme
