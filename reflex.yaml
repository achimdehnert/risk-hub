# ── Rechte & Rollen ───────────────────────────────────────────────
# Access Control Architecture:
#   1. ModuleAccessMiddleware (settings.MODULE_URL_MAP)
#      Maps URL-Prefixe → Modul-Codes: ex, risk, gbu, dsb
#   2. ModuleSubscription: Tenant hat Modul aktiv (status: active/trial)
#   3. ModuleMembership: User hat Zugang zum Modul (role: admin/manager/member/viewer)
#   4. @require_module("mod", min_role="X"): feingranulare View-Deko
#
# Role hierarchy (aufsteigend): viewer < member < manager < admin
# Org-Membership roles: owner, admin, member, viewer, external

module_url_map:
  /ex/: ex
  /api/ex/: ex
  /substances/: ex
  /api/substances/: ex
  /risk/: risk
  /gbu/: gbu
  /api/gbu/: gbu
  /dsb/: dsb

# Routes NOT behind module guard (no MODULE_URL_MAP entry):
unguarded_routes:
  - /dashboard/
  - /sds/
  - /kataster/
  - /documents/
  - /brandschutz/
  - /projects/
  - /notifications/
  - /audit/
  - /tenants/
  - /accounts/
  - /admin/
  - /livez/
  - /healthz/

test_users:
  admin:
    username: admin
    password: admin123
    org_role: admin
    module_role: admin
    is_staff: true
    is_superuser: true
  editor:
    username: editor
    password: editor123
    org_role: member
    module_role: member
    is_staff: false
  viewer:
    username: viewer
    password: viewer123
    org_role: viewer
    module_role: viewer
    is_staff: false
  external:
    username: external
    password: external123
    org_role: external
    module_role: viewer
    is_staff: false
  nomods:
    username: nomods
    password: nomods123
    org_role: none
    module_role: none
    is_staff: false

