services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    # No external port - only accessible within docker network
    # ports:
    #   - "6379:6379"

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:8001:8000"
    command: ["web"]

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
    command: ["worker"]

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - app
    ports:
      - "127.0.0.1:8080:80"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
