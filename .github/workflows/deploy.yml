name: "Deploy"

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      image_tag_override:
        description: "Rollback auf Image-Tag (z.B. v1.2.1) — leer = auto"
        required: false
        default: ""
      target_environment:
        description: "Ziel-Environment (leer=auto, staging, production)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - staging
          - production

jobs:
  ci:
    uses: achimdehnert/platform/.github/workflows/_ci-python.yml@main
    if: startsWith(github.ref, 'refs/heads/')
    with:
      django_settings_module: "config.settings_test"
      src_dir: "src"
      skip_tests: true
    secrets: inherit

  deploy:
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    uses: achimdehnert/platform/.github/workflows/_deploy-unified.yml@main
    with:
      app_name: "risk-hub"
      app_path: "/opt/risk-hub"
      dockerfile_path: "docker/app/Dockerfile"
      health_check_url: "https://schutztat.de/healthz/"
      image_tag_override: ${{ inputs.image_tag_override || '' }}
      target_environment: ${{ inputs.target_environment || '' }}
      notify_discord: true
    secrets: inherit
