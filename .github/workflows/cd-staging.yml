# risk-hub — CD Staging Pipeline
name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'
  push:
    branches:
      - develop

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to hetzner-dev (Staging)
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.kiohnerisiko.de

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Image Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_DEV_HOST }}
          username: ${{ secrets.HETZNER_DEV_USER }}
          key: ${{ secrets.HETZNER_DEV_SSH_KEY }}
          source: "docker-compose.staging.yml"
          target: "/opt/risk-hub-staging/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_DEV_HOST }}
          username: ${{ secrets.HETZNER_DEV_USER }}
          key: ${{ secrets.HETZNER_DEV_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/risk-hub-staging
            IMAGE_TAG="${{ steps.tag.outputs.tag }}"
            docker pull "ghcr.io/achimdehnert/risk-hub:${IMAGE_TAG}"
            if grep -q "^IMAGE_TAG=" .env.staging 2>/dev/null; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env.staging
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.staging
            fi
            docker compose -f docker-compose.staging.yml --env-file .env.staging \
              up -d --force-recreate --remove-orphans
            sleep 15
            docker exec risk_hub_staging_web python manage.py migrate --noinput 2>&1 | tail -10
            echo "[staging] Done."

      - name: Health Check
        continue-on-error: true
        run: |
          sleep 10
          for i in 1 2 3; do
            if curl -sf https://staging.kiohnerisiko.de/livez/ --max-time 10; then
              echo "Health check passed"; exit 0
            fi
            sleep 5
          done
          echo "Health check failed (may need time to start)"
