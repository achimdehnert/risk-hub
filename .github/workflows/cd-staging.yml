# risk-hub — CD Staging
name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to hetzner-dev (Staging)
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.kiohnerisiko.de

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_DEV_HOST }}
          username: ${{ secrets.HETZNER_DEV_USER }}
          key: ${{ secrets.HETZNER_DEV_SSH_KEY }}
          source: docker-compose.staging.yml
          target: /opt/risk-hub-staging/
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_AUTH_B64: ${{ secrets.GHCR_AUTH_B64 }}
        with:
          host: ${{ secrets.HETZNER_DEV_HOST }}
          username: ${{ secrets.HETZNER_DEV_USER }}
          key: ${{ secrets.HETZNER_DEV_SSH_KEY }}
          envs: GHCR_AUTH_B64
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p ~/.docker
            printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${GHCR_AUTH_B64}" > ~/.docker/config.json
            cd /opt/risk-hub-staging
            docker pull ghcr.io/achimdehnert/risk-hub/risk-hub-web:latest
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=latest/' .env.staging 2>/dev/null || echo 'IMAGE_TAG=latest' >> .env.staging
            docker compose -f docker-compose.staging.yml --env-file .env.staging \
              up -d --force-recreate --remove-orphans
            sleep 15
            docker exec risk_hub_staging_web python manage.py migrate --noinput 2>&1 | tail -5
            echo "[risk-hub staging] Done."

      - name: Health Check
        continue-on-error: true
        run: |
          sleep 10
          for i in 1 2 3; do
            curl -sf https://staging.kiohnerisiko.de/livez/ --max-time 10 && exit 0 || sleep 5
          done; echo "health check timed out"
