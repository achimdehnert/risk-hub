name: Setup Staging Environment

on:
  workflow_dispatch:

jobs:
  setup-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files to server
        run: |
          set -euo pipefail
          scp docker-compose.staging.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/risk-hub/docker-compose.staging.yml
          scp docker/nginx/nginx-staging.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/etc/nginx/sites-available/staging.schutztat.de.conf

      - name: Enable nginx + start staging
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' << 'REMOTE'
          set -euo pipefail
          ln -sf /etc/nginx/sites-available/staging.schutztat.de.conf \
                 /etc/nginx/sites-enabled/staging.schutztat.de.conf
          nginx -t && systemctl reload nginx

          cd /opt/risk-hub
          # Explicit project-name prevents orphan-contamination with prod stack
          docker compose -p risk-hub-staging -f docker-compose.staging.yml --env-file .env.staging down 2>/dev/null || true
          docker compose -p risk-hub-staging -f docker-compose.staging.yml --env-file .env.staging pull --quiet
          docker compose -p risk-hub-staging -f docker-compose.staging.yml --env-file .env.staging up -d

          for i in $(seq 1 36); do
            S=$(curl -sf -o /dev/null -w '%{http_code}' \
              -H 'Host: staging.schutztat.de' http://127.0.0.1:8099/livez/ 2>/dev/null || echo "000")
            [ "$S" = "200" ] && echo "OK: /livez/ -> 200 (attempt $i)" && break
            echo "  $i: $S - 5s..."
            sleep 5
          done

          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep risk
          REMOTE

      - name: Summary
        if: success()
        run: |
          echo "## Staging Setup Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://staging.schutztat.de" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Port:** 8099" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** risk-hub-staging" >> "$GITHUB_STEP_SUMMARY"
