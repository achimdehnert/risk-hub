name: Ruff Format Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.5

      - name: Apply ruff format
        run: ruff format src/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (
            git add -A
            git commit -m "style: apply ruff format 0.15.5"
            git push
          )
