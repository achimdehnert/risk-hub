# ADR-090: CI/CD Pipeline for risk-hub (Schutztat)
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tools
        run: pip install ruff pip-audit

      - name: Ruff Lint
        run: ruff check src/ --output-format=github

      - name: Ruff Format Check
        run: ruff format --check src/

      - name: Security Audit (pip-audit)
        run: |
          set -euo pipefail
          pip-audit -r requirements.txt --skip-editable --ignore-vuln GHSA-0000 2>&1 || {
            echo "::warning::pip-audit found issues (non-blocking for now)"
          }

  test:
    runs-on: self-hosted
    timeout-minutes: 10
    needs: fast-checks
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: risk_hub_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      PYTHONPATH: src
      DATABASE_URL: "postgresql://test:test@localhost:5432/risk_hub_ci"
      SECRET_KEY: "test-secret-key-not-for-production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git for private packages
        run: |
          GITCONFIG_FILE="$(mktemp)"
          printf '[url "https://x-access-token:%s@github.com/"]\n\tinsteadOf = https://github.com/\n' \
            "${{ secrets.PROJECT_PAT }}" > "$GITCONFIG_FILE"
          echo "GIT_CONFIG_GLOBAL=${GITCONFIG_FILE}" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: |
          set -euo pipefail
          pip install --upgrade pip "setuptools>=69" wheel
          pip install -r requirements.txt || echo "::warning::Some packages failed to install"
          pip install -r requirements-dev.txt || echo "::warning::Some dev packages failed to install"

      - name: Install iil-packages
        run: |
          pip install \
            "iil-aifw>=0.5.0,<1" \
            "iil-promptfw>=0.5.1,<1" \
            "iil-authoringfw>=0.3.0,<1" \
            "iil-nl2cad>=0.1.0,<1" \
            2>/dev/null || true

      - name: Django System Check
        run: python -m django check --deploy --fail-level WARNING

      - name: Run Tests + Coverage
        run: |
          python -m pytest \
            --tb=short \
            --no-header \
            -q \
            --cov=src \
            --cov-report=term-missing:skip-covered \
            --cov-report=html \
            --cov-fail-under=74

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f .coverage ]; then
            TOTAL=$(python -m coverage report --format=total 2>/dev/null || echo "0")
            echo "## Coverage: ${TOTAL}%" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-build:
    runs-on: self-hosted
    timeout-minutes: 15
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Save Previous Image SHA
        id: pre_deploy
        run: |
          set -euo pipefail
          CURRENT_SHA=$(ssh -o ConnectTimeout=5 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker inspect --format='{{index .Config.Labels \"org.opencontainers.image.revision\"}}' \
            ${{ vars.DEPLOY_CONTAINER }}" 2>/dev/null || echo "unknown")
          echo "previous_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker Build + Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ vars.DEPLOY_DOCKERFILE }}
          push: true
          tags: |
            ${{ vars.DEPLOY_IMAGE }}:${{ github.sha }}
            ${{ vars.DEPLOY_IMAGE }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          secrets: |
            GIT_TOKEN=${{ secrets.PROJECT_PAT }}

      - name: Push summary
        run: echo "## Pushed ${{ vars.DEPLOY_IMAGE }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

    outputs:
      previous_sha: ${{ steps.pre_deploy.outputs.previous_sha }}

  deploy-verify:
    runs-on: self-hosted
    timeout-minutes: 10
    needs: deploy-build
    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Pull New Image
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ vars.DEPLOY_SERVER_PATH }} && \
            docker compose -p risk-hub-prod -f docker-compose.prod.yml pull
          "

      - name: Sanitize .env.prod
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "ENV_FILE=${{ vars.DEPLOY_SERVER_PATH }}/.env.prod && \
            sed -i '/\"/d' \"${ENV_FILE}\" && \
            sed -i '/^STRIPE_/d' \"${ENV_FILE}\" && \
            echo 'env.prod sanitized'"

      - name: Inject Stripe Secrets into .env.prod
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER_MONTHLY: ${{ secrets.STRIPE_PRICE_STARTER_MONTHLY }}
          STRIPE_PRICE_STARTER_ANNUAL: ${{ secrets.STRIPE_PRICE_STARTER_ANNUAL }}
          STRIPE_PRICE_PROFESSIONAL_MONTHLY: ${{ secrets.STRIPE_PRICE_PROFESSIONAL_MONTHLY }}
          STRIPE_PRICE_PROFESSIONAL_ANNUAL: ${{ secrets.STRIPE_PRICE_PROFESSIONAL_ANNUAL }}
          STRIPE_PRICE_BUSINESS_MONTHLY: ${{ secrets.STRIPE_PRICE_BUSINESS_MONTHLY }}
          STRIPE_PRICE_BUSINESS_ANNUAL: ${{ secrets.STRIPE_PRICE_BUSINESS_ANNUAL }}
          DEPLOY_SERVER_PATH: ${{ vars.DEPLOY_SERVER_PATH }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "ENV_FILE=${DEPLOY_SERVER_PATH}/.env.prod && \
            printf 'STRIPE_SECRET_KEY=%s\nSTRIPE_PUBLISHABLE_KEY=%s\nSTRIPE_WEBHOOK_SECRET=%s\nSTRIPE_PRICE_STARTER_MONTHLY=%s\nSTRIPE_PRICE_STARTER_ANNUAL=%s\nSTRIPE_PRICE_PROFESSIONAL_MONTHLY=%s\nSTRIPE_PRICE_PROFESSIONAL_ANNUAL=%s\nSTRIPE_PRICE_BUSINESS_MONTHLY=%s\nSTRIPE_PRICE_BUSINESS_ANNUAL=%s\n' \
            '${STRIPE_SECRET_KEY}' '${STRIPE_PUBLISHABLE_KEY}' '${STRIPE_WEBHOOK_SECRET}' \
            '${STRIPE_PRICE_STARTER_MONTHLY}' '${STRIPE_PRICE_STARTER_ANNUAL}' \
            '${STRIPE_PRICE_PROFESSIONAL_MONTHLY}' '${STRIPE_PRICE_PROFESSIONAL_ANNUAL}' \
            '${STRIPE_PRICE_BUSINESS_MONTHLY}' '${STRIPE_PRICE_BUSINESS_ANNUAL}' \
            >> \"${ENV_FILE}\" && \
            echo 'Stripe secrets injected'"

      - name: Backup Database
        run: |
          BACKUP_FILE="${{ vars.DEPLOY_APP_NAME }}-pre-${GITHUB_SHA::7}-$(date +%Y%m%d-%H%M%S).sql.gz"
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            mkdir -p /opt/backups && \
            docker exec ${{ vars.DEPLOY_DB_CONTAINER }} \
              pg_dump -U \${POSTGRES_USER:-postgres} \${POSTGRES_DB:-risk_hub} \
              | gzip > /opt/backups/${BACKUP_FILE} && \
            echo \"Backup OK: /opt/backups/${BACKUP_FILE}\"
          "

      - name: Start App
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ vars.DEPLOY_SERVER_PATH }} && \
            docker compose -p risk-hub-prod -f docker-compose.prod.yml up -d --force-recreate
          "

      - name: Wait for Liveness (max 150s)
        run: |
          for i in $(seq 1 30); do
            HTTP_STATUS=$(ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "curl -sf -o /dev/null -w '%{http_code}' \
              -H 'Host: schutztat.de' \
              http://localhost:${{ vars.DEPLOY_PORT }}/livez/" 2>/dev/null || echo "000")
            [ "$HTTP_STATUS" = "200" ] && echo "OK: /livez/ -> 200" && exit 0
            echo "Attempt $i: HTTP $HTTP_STATUS - waiting 5s..."
            sleep 5
          done
          echo "FAIL: /livez/ not reachable after 150s"
          exit 1

      - name: Post-Deploy Summary
        if: success()
        run: |
          echo "## Deploy Success" >> "$GITHUB_STEP_SUMMARY"
          echo "- **App:** ${{ vars.DEPLOY_APP_NAME }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    runs-on: self-hosted
    timeout-minutes: 10
    needs: deploy-verify
    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Staging
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ vars.DEPLOY_SERVER_PATH }} && \
            docker compose -p risk-hub-staging -f docker-compose.staging.yml --env-file .env.staging pull --quiet && \
            docker compose -p risk-hub-staging -f docker-compose.staging.yml --env-file .env.staging up -d --force-recreate
          "

      - name: Wait for Staging Liveness (max 150s)
        run: |
          for i in $(seq 1 30); do
            HTTP_STATUS=$(ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "curl -sf -o /dev/null -w '%{http_code}' \
              -H 'Host: staging.schutztat.de' \
              http://localhost:8099/livez/" 2>/dev/null || echo "000")
            [ "$HTTP_STATUS" = "200" ] && echo "OK: staging /livez/ -> 200" && exit 0
            echo "Attempt $i: HTTP $HTTP_STATUS - waiting 5s..."
            sleep 5
          done
          echo "FAIL: staging /livez/ not reachable after 150s"
          exit 1

      - name: Staging Summary
        if: success()
        run: |
          echo "## Staging Deploy Success" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://staging.schutztat.de" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ vars.DEPLOY_IMAGE }}:latest" >> "$GITHUB_STEP_SUMMARY"

  rollback:
    runs-on: self-hosted
    timeout-minutes: 5
    needs: [deploy-build, deploy-verify]
    if: failure() && needs.deploy-build.result == 'success'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Collect Failure Logs
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker logs ${{ vars.DEPLOY_CONTAINER }} --tail 100" 2>&1 \
            | tee /tmp/failure_logs.txt || true

      - name: Rollback to Previous Image
        run: |
          PREV_SHA="${{ needs.deploy-build.outputs.previous_sha }}"
          if [ "$PREV_SHA" = "unknown" ] || [ -z "$PREV_SHA" ]; then
            echo "WARN: No previous SHA found - cannot rollback automatically"
            exit 1
          fi
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ vars.DEPLOY_SERVER_PATH }} && \
            docker pull ${{ vars.DEPLOY_IMAGE }}:${PREV_SHA} && \
            IMAGE_TAG=${PREV_SHA} docker compose -p risk-hub-prod -f docker-compose.prod.yml \
              up -d --no-deps --force-recreate \
              ${{ vars.DEPLOY_WEB_SERVICE }} ${{ vars.DEPLOY_APP_NAME }}-worker
          "

      - name: Notify
        if: always()
        run: |
          echo "## Deployment FAILED - Rollback Executed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Rolled back to:** ${{ needs.deploy-build.outputs.previous_sha }}" >> "$GITHUB_STEP_SUMMARY"
