name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: "Lint + Test"
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: risk_hub_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15433:5432
    steps:
      - name: Prune stale Docker networks (self-hosted)
        run: docker network prune -f 2>/dev/null || true

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (WeasyPrint)
        continue-on-error: true
        run: |
          if sudo -n true 2>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq \
              libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
              libgdk-pixbuf2.0-0 libffi-dev libcairo2 \
              fonts-liberation 2>/dev/null || true
          else
            echo "No passwordless sudo — skipping apt-get (libs should be pre-installed)"
          fi

      - name: Install dependencies
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        run: |
          # Install private iil-fieldprefill from git (not on PyPI, ADR-107)
          pip install "git+https://x-access-token:${PROJECT_PAT}@github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null \
            || pip install "git+https://github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null \
            || echo "WARN: iil-fieldprefill not installable — some tests may fail"
          pip install -r requirements.txt
          pip install -e packages/django-tenancy || true
          pip install -r requirements-test.txt || true
          pip install ruff pytest-env

      - name: Ruff check
        working-directory: src
        run: ruff check . --output-format=github

      - name: Ruff format check
        working-directory: src
        run: ruff format --check .

      - name: Run tests (incl. URL audit)
        working-directory: src
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: "postgresql://test:test@localhost:15433/risk_hub_ci"
        run: |
          pytest --tb=short -q \
            -m "not integration and not contract and not slow" \
            --relax-naming \
            --cov --cov-report=term-missing
