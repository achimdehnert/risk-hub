name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Lint + Test"
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: risk_hub_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e packages/django-tenancy || true
          pip install -r requirements-test.txt || true
          pip install ruff pytest-env

      - name: Ruff check
        working-directory: src
        run: ruff check . --output-format=github

      - name: Run tests (incl. URL audit)
        working-directory: src
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: "postgresql://test:test@localhost:5432/risk_hub_ci"
        run: |
          pytest --tb=short -q \
            -m "not integration and not contract and not slow"
